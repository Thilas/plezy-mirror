name: Sync Plezy releases

on:
  schedule:
    - cron: 0 0/6 * * *
  workflow_dispatch:
    inputs:
      max_releases:
        description: Maximum number of releases to sync
        type: number

permissions:
  contents: write

jobs:
  release:
    name: Sync Plezy releases
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Sync Plezy releases
        shell: pwsh
        run: ./Sync-GitHubReleases.ps1 -MaxReleases $env:MAX_RELEASES -Verbose
        env:
          GITHUB_TOKEN : ${{ secrets.GITHUB_TOKEN }}
          MAX_RELEASES : ${{ inputs.max_releases || 1 }}
